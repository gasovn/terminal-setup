"$schema" = 'https://starship.rs/config-schema.json'

# Two-line prompt: info on top, input on bottom
format = """
[](teal)\
$os\
$username\
[](fg:teal bg:blue)\
$directory\
[](fg:blue bg:green)\
$git_branch\
$git_status\
[](fg:green bg:sapphire)\
$c\
$rust\
$golang\
$nodejs\
$python\
$dotnet\
$package\
[](fg:sapphire bg:surface0)\
$docker_context\
[](fg:surface0)\
$line_break\
$character"""

# Right-aligned part (cmd duration, time)
right_format = """$cmd_duration$time"""

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

# --- Left side ---

[os]
disabled = false
style = "fg:base bg:teal"

[os.symbols]
Fedora = "󰣛"
Linux = "󰌽"
Macos = "󰀵"
Ubuntu = "󰕈"
Windows = "󰍲"
Arch = "󰣇"
Debian = "󰣚"

[username]
show_always = false
style_user = "fg:base bg:teal"
style_root = "fg:base bg:red"
format = '[ $user]($style)'

[directory]
style = "fg:base bg:blue"
format = "[ 󰉋 $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "

[git_branch]
symbol = " "
style = "fg:base bg:green"
format = '[ $symbol$branch ]($style)'

[git_status]
style = "fg:base bg:green"
format = '[$all_status$ahead_behind]($style)'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
deleted = "✘${count}"
conflicted = "=${count}"

# --- Languages (only shown in relevant projects) ---

[nodejs]
symbol = " "
style = "fg:base bg:sapphire"
format = '[ $symbol$version ]($style)'
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

[golang]
symbol = " "
style = "fg:base bg:sapphire"
format = '[ $symbol$version ]($style)'

[python]
symbol = " "
style = "fg:base bg:sapphire"
format = '[ $symbol$version( \($virtualenv\)) ]($style)'

[rust]
symbol = "󱘗 "
style = "fg:base bg:sapphire"
format = '[ $symbol$version ]($style)'

[c]
symbol = " "
style = "fg:base bg:sapphire"
format = '[ $symbol$version ]($style)'

[dotnet]
symbol = "󰪮 "
style = "fg:base bg:sapphire"
format = '[ $symbol$version ]($style)'

[package]
symbol = "󰏗 "
style = "fg:base bg:sapphire"
format = '[ $symbol$version ]($style)'

[docker_context]
symbol = " "
style = "fg:text bg:surface0"
format = '[ $symbol$context ]($style)'

# --- Right side ---

[cmd_duration]
min_time = 3000
style = "fg:yellow"
format = '[ 󱎫 $duration]($style)'
show_milliseconds = false

[time]
disabled = false
time_format = "%H:%M"
style = "fg:overlay1"
format = '[  $time ]($style)'

# --- Second line ---

[line_break]
disabled = false

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold mauve)'

# --- Conditional modules ---

[hostname]
ssh_only = true
style = "fg:base bg:teal"
format = '[@$hostname ]($style)'
